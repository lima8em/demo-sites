<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="page-title">Loading...</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ─── RESET ─────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:62.5%}
body{font-family:'Poppins',sans-serif;font-size:1.5rem;color:#121212;background:#fff;line-height:1.6}
img{max-width:100%;display:block}
button{font-family:inherit;cursor:pointer}
a{text-decoration:none;color:inherit}
ul{list-style:none}

/* ─── CSS VARS ───────────────────────────────────── */
:root{
  --accent:#53AF01;
  --dark:#121212;
  --white:#fff;
  --border:#e5e7eb;
  --muted:#6b7280;
  --radius:6px;
}

/* ─── TICKER ─────────────────────────────────────── */
.ticker{
  background:var(--accent);
  overflow:hidden;
  padding:11px 0;
}
.ticker-track{
  display:flex;
  white-space:nowrap;
  animation:horTicker 40s linear infinite;
  width:max-content;
}
.ticker-item{
  padding:0 2.5rem;
  font-size:1.3rem;
  font-weight:700;
  letter-spacing:0.1em;
  text-transform:uppercase;
  color:#fff;
}
@keyframes horTicker{
  from{transform:translateX(0)}
  to{transform:translateX(-50%)}
}

/* ─── HEADER ─────────────────────────────────────── */
.site-header{
  position:sticky;
  top:0;
  z-index:100;
  background:var(--white);
  border-bottom:1px solid var(--border);
}
.header-inner{
  max-width:1400px;
  margin:0 auto;
  padding:0 5.5rem;
  height:64px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:24px;
}
.header-logo{
  font-size:2rem;
  font-weight:700;
  letter-spacing:-0.02em;
  flex-shrink:0;
}
.header-nav{
  display:flex;
  gap:2.4rem;
}
.header-nav a{
  font-size:1.3rem;
  color:var(--muted);
  transition:color 0.15s;
}
.header-nav a:hover{color:var(--dark)}
.header-icons{
  display:flex;
  align-items:center;
  gap:16px;
}
.cart-btn{
  background:none;
  border:none;
  position:relative;
  padding:8px;
  display:flex;
  align-items:center;
}
.cart-btn svg{width:22px;height:22px;stroke:#121212;fill:none;stroke-width:1.5}
.cart-badge{
  position:absolute;
  top:2px;
  right:2px;
  background:var(--accent);
  color:#fff;
  font-size:1rem;
  font-weight:700;
  width:16px;
  height:16px;
  border-radius:50%;
  display:none;
  align-items:center;
  justify-content:center;
}
.cart-badge.visible{display:flex}

/* ─── PRODUCT SECTION ────────────────────────────── */
.product-section{
  max-width:1400px;
  margin:0 auto;
  padding:2.4rem 5.5rem 3.6rem;
}
.product-grid{
  display:grid;
  grid-template-columns:55% 1fr;
  gap:5rem;
  align-items:start;
}

/* ─── GALLERY (LEFT) ─────────────────────────────── */
.gallery-col{
  position:sticky;
  top:80px;
}
.gallery-wrapper{
  display:flex;
  flex-direction:row;
  gap:12px;
  align-items:flex-start;
}
.thumb-strip{
  display:flex;
  flex-direction:column;
  gap:8px;
  flex-shrink:0;
  width:74px;
}
.thumb{
  width:74px;
  height:74px;
  border:2px solid var(--border);
  border-radius:8px;
  overflow:hidden;
  cursor:pointer;
  transition:border-color 0.15s;
  flex-shrink:0;
}
.thumb:hover{border-color:#aaa}
.thumb.is-active{border-color:var(--accent)}
.thumb img{
  width:100%;
  height:100%;
  object-fit:cover;
}
.main-image-wrap{
  flex:1;
  border-radius:12px;
  overflow:hidden;
  background:#f7f7f7;
  aspect-ratio:1/1;
}
.main-image-wrap img{
  width:100%;
  height:100%;
  object-fit:cover;
  transition:opacity 0.2s;
}
.gallery-nav{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:16px;
  margin-top:12px;
}
.gallery-nav button{
  background:none;
  border:1px solid var(--border);
  border-radius:50%;
  width:36px;
  height:36px;
  display:flex;
  align-items:center;
  justify-content:center;
  transition:border-color 0.15s;
}
.gallery-nav button:hover{border-color:var(--dark)}
.gallery-nav button svg{width:12px;height:12px;fill:none;stroke:#121212;stroke-width:2}
.gallery-counter{font-size:1.2rem;color:var(--muted)}

/* ─── PRODUCT INFO (RIGHT) ───────────────────────── */
.product-info{
  position:sticky;
  top:80px;
}
.product-title{
  font-size:2.8rem;
  font-weight:700;
  line-height:1.2;
  letter-spacing:-0.02em;
  margin-bottom:1.6rem;
}

/* Price */
.price-block{
  display:flex;
  align-items:center;
  gap:12px;
  flex-wrap:wrap;
  margin-bottom:1.2rem;
}
.price-sale{font-size:2.8rem;font-weight:700;line-height:1}
.price-compare{font-size:1.8rem;color:var(--muted);text-decoration:line-through}
.badge-tag{
  display:inline-flex;
  align-items:center;
  gap:4px;
  background:var(--accent);
  color:#fff;
  font-size:1.1rem;
  font-weight:700;
  padding:3px 9px;
  border-radius:4px;
  letter-spacing:0.04em;
  text-transform:uppercase;
}
.badge-tag svg{width:10px;height:10px;fill:#fff}

/* Stars */
.stars-line{
  font-size:1.4rem;
  margin-bottom:1.6rem;
  display:flex;
  align-items:center;
  gap:6px;
}
.stars-line .stars{color:#f59e0b;letter-spacing:1px}

/* Benefits */
.benefits-block{
  font-size:1.4rem;
  line-height:1.8;
  margin-bottom:2rem;
}

/* Bundle picker */
.bundle-section{margin-bottom:1.6rem}
.bundle-title{
  display:flex;
  align-items:center;
  gap:12px;
  font-size:1.2rem;
  font-weight:700;
  text-transform:uppercase;
  letter-spacing:0.1em;
  margin-bottom:1.2rem;
}
.bundle-title::before,.bundle-title::after{
  content:'';
  flex:1;
  height:1px;
  background:var(--border);
}

input.qty-radio{display:none}
.qty-label{
  display:block;
  border:2px solid var(--border);
  border-radius:8px;
  padding:14px 16px;
  margin-bottom:8px;
  cursor:pointer;
  position:relative;
  transition:border-color 0.15s,background 0.15s;
}
.qty-label:hover{border-color:#aaa}
input.qty-radio:checked + .qty-label{
  border-color:var(--accent);
  background:#f0f9e8;
}
.most-popular-badge{
  position:absolute;
  top:-11px;
  left:14px;
  background:var(--accent);
  color:#fff;
  font-size:1rem;
  font-weight:700;
  padding:2px 10px;
  border-radius:4px;
  text-transform:uppercase;
  letter-spacing:0.06em;
}
.qty-label-inner{
  display:flex;
  justify-content:space-between;
  align-items:center;
}
.qty-left{display:flex;flex-direction:column;gap:5px}
.qty-label-text{font-size:1.4rem;font-weight:600}
.qty-benefit{
  display:inline-block;
  background:var(--accent);
  color:#fff;
  font-size:1rem;
  font-weight:700;
  padding:2px 8px;
  border-radius:4px;
  text-transform:uppercase;
  letter-spacing:0.06em;
}
.qty-benefit.orange{background:#f97316}
.qty-benefit.red{background:#ef4444}
.qty-right{text-align:right}
.qty-price{font-size:1.6rem;font-weight:700;display:block}
.qty-compare{font-size:1.3rem;color:var(--muted);text-decoration:line-through;display:block}

/* ATC button */
.atc-btn{
  width:100%;
  background:var(--dark);
  color:var(--white);
  border:none;
  padding:1.8rem;
  font-size:1.5rem;
  font-weight:700;
  text-transform:uppercase;
  letter-spacing:0.1em;
  border-radius:var(--radius);
  margin-top:1.6rem;
  transition:background 0.2s;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:8px;
}
.atc-btn:hover{background:var(--accent)}

/* Payment icons */
.payment-icons{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:8px;
  margin-top:12px;
  opacity:0.5;
  flex-wrap:wrap;
}
.payment-icon{
  height:22px;
  background:#e5e7eb;
  border-radius:4px;
  padding:2px 8px;
  font-size:1.1rem;
  font-weight:700;
  color:#333;
  display:flex;
  align-items:center;
}

/* Trust strip */
.trust-strip{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:12px;
  margin-top:2rem;
  padding-top:2rem;
  border-top:1px solid var(--border);
}
.trust-item{text-align:center}
.trust-icon{font-size:2.2rem;display:block;margin-bottom:4px}
.trust-text{font-size:1.1rem;color:var(--muted);line-height:1.4}

/* Accordion */
.accordion{margin-top:2rem;border-top:1px solid var(--border)}
.acc-item{border-bottom:1px solid var(--border)}
.acc-trigger{
  width:100%;
  background:none;
  border:none;
  padding:1.6rem 0;
  display:flex;
  justify-content:space-between;
  align-items:center;
  font-size:1.4rem;
  font-weight:600;
  text-align:left;
  color:var(--dark);
}
.acc-chevron{flex-shrink:0;transition:transform 0.2s}
.acc-chevron svg{width:14px;height:14px;fill:none;stroke:#121212;stroke-width:2}
.acc-item.open .acc-chevron{transform:rotate(180deg)}
.acc-body{
  font-size:1.3rem;
  color:var(--muted);
  line-height:1.8;
  padding-bottom:1.6rem;
  display:none;
}
.acc-item.open .acc-body{display:block}

/* ─── STICKY ATC BAR ─────────────────────────────── */
.sticky-atc{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  background:var(--white);
  border-top:1px solid var(--border);
  z-index:99;
  transform:translateY(100%);
  transition:transform 0.3s ease;
  box-shadow:0 -4px 20px rgba(0,0,0,0.08);
}
.sticky-atc.show{transform:translateY(0)}
.sticky-atc-inner{
  max-width:1400px;
  margin:0 auto;
  padding:12px 5.5rem;
  display:flex;
  align-items:center;
  gap:24px;
}
.sticky-atc-left{flex:1;min-width:0}
.sticky-title{font-size:1.5rem;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sticky-price{font-size:1.4rem;color:var(--muted)}
.sticky-price strong{color:var(--dark);font-weight:700}
.sticky-atc-btn{
  background:var(--accent);
  color:#fff;
  border:none;
  padding:12px 32px;
  font-size:1.3rem;
  font-weight:700;
  text-transform:uppercase;
  letter-spacing:0.08em;
  border-radius:var(--radius);
  white-space:nowrap;
  transition:opacity 0.15s;
}
.sticky-atc-btn:hover{opacity:0.88}

/* ─── CART DRAWER ────────────────────────────────── */
.cart-overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.45);
  z-index:200;
  opacity:0;
  pointer-events:none;
  transition:opacity 0.3s;
}
.cart-overlay.open{opacity:1;pointer-events:auto}
.cart-drawer{
  position:fixed;
  top:0;
  right:0;
  width:420px;
  max-width:100vw;
  height:100vh;
  background:var(--white);
  z-index:201;
  transform:translateX(100%);
  transition:transform 0.3s cubic-bezier(.4,0,.2,1);
  display:flex;
  flex-direction:column;
  box-shadow:-8px 0 30px rgba(0,0,0,0.12);
}
.cart-drawer.open{transform:translateX(0)}
.cart-header{
  padding:20px 24px;
  border-bottom:1px solid var(--border);
  display:flex;
  align-items:center;
  justify-content:space-between;
}
.cart-header h2{font-size:1.8rem;font-weight:700}
.cart-header-count{font-size:1.3rem;color:var(--muted)}
.cart-close{
  background:none;
  border:none;
  width:32px;
  height:32px;
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:50%;
  transition:background 0.15s;
}
.cart-close:hover{background:#f3f4f6}
.cart-close svg{width:18px;height:18px;stroke:#121212;stroke-width:2;fill:none}
.cart-body{flex:1;overflow-y:auto;padding:20px 24px}
.cart-empty{
  text-align:center;
  padding:60px 20px;
  color:var(--muted);
  font-size:1.4rem;
}
.cart-item{
  display:flex;
  gap:16px;
  padding:16px 0;
  border-bottom:1px solid var(--border);
}
.cart-item:last-child{border-bottom:none}
.cart-item-img{
  width:80px;
  height:80px;
  object-fit:cover;
  border-radius:8px;
  border:1px solid var(--border);
  flex-shrink:0;
}
.cart-item-info{flex:1;min-width:0}
.cart-item-name{font-size:1.4rem;font-weight:600;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cart-item-variant{font-size:1.2rem;color:var(--muted);margin-bottom:8px}
.cart-item-bottom{display:flex;align-items:center;justify-content:space-between}
.qty-controls{
  display:flex;
  align-items:center;
  border:1px solid var(--border);
  border-radius:4px;
  overflow:hidden;
}
.qty-controls button{
  background:none;
  border:none;
  width:28px;
  height:28px;
  font-size:1.6rem;
  line-height:1;
  display:flex;
  align-items:center;
  justify-content:center;
  transition:background 0.1s;
}
.qty-controls button:hover{background:#f3f4f6}
.qty-num{padding:0 8px;font-size:1.3rem;font-weight:600;min-width:28px;text-align:center}
.cart-item-price{font-size:1.5rem;font-weight:700}
.cart-item-del{
  background:none;
  border:none;
  color:var(--muted);
  font-size:1.2rem;
  margin-top:4px;
  padding:0;
  text-decoration:underline;
}
.cart-item-del:hover{color:var(--dark)}
.cart-footer{padding:20px 24px;border-top:1px solid var(--border)}
.cart-total-row{
  display:flex;
  justify-content:space-between;
  align-items:center;
  font-size:1.6rem;
  font-weight:700;
  margin-bottom:16px;
}
.cart-subtotal-note{font-size:1.2rem;color:var(--muted);text-align:center;margin-bottom:12px}
.checkout-btn{
  width:100%;
  background:var(--accent);
  color:#fff;
  border:none;
  padding:1.6rem;
  font-size:1.5rem;
  font-weight:700;
  text-transform:uppercase;
  letter-spacing:0.08em;
  border-radius:var(--radius);
  transition:opacity 0.15s;
}
.checkout-btn:hover{opacity:0.88}

/* ─── CHECKOUT MODAL ─────────────────────────────── */
.modal-overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.5);
  z-index:300;
  display:none;
  align-items:center;
  justify-content:center;
  padding:20px;
}
.modal-overlay.open{display:flex}
.modal-box{
  background:#fff;
  border-radius:12px;
  width:100%;
  max-width:820px;
  max-height:90vh;
  overflow-y:auto;
  box-shadow:0 20px 60px rgba(0,0,0,0.2);
}
.modal-top{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:20px 28px;
  border-bottom:1px solid var(--border);
}
.modal-top h2{font-size:1.8rem;font-weight:700}
.modal-close{
  background:none;
  border:none;
  font-size:2.4rem;
  line-height:1;
  color:var(--muted);
}
.modal-body{
  display:grid;
  grid-template-columns:1fr 340px;
}
.modal-form{padding:28px}
.express-btns{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-bottom:20px;
}
.express-btn{
  border:1.5px solid var(--border);
  background:#fff;
  border-radius:var(--radius);
  padding:12px;
  font-size:1.3rem;
  font-weight:700;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:6px;
  transition:border-color 0.15s;
}
.express-btn:hover{border-color:#aaa}
.express-btn.shop{background:#5a31f4;color:#fff;border-color:#5a31f4}
.or-divider{
  text-align:center;
  font-size:1.2rem;
  color:var(--muted);
  margin-bottom:20px;
  position:relative;
}
.or-divider::before,.or-divider::after{
  content:'';
  position:absolute;
  top:50%;
  width:calc(50% - 20px);
  height:1px;
  background:var(--border);
}
.or-divider::before{left:0}
.or-divider::after{right:0}
.form-row{margin-bottom:16px}
.form-row label{display:block;font-size:1.2rem;font-weight:600;margin-bottom:5px}
.form-row input,.form-row select{
  width:100%;
  border:1.5px solid var(--border);
  border-radius:var(--radius);
  padding:11px 14px;
  font-size:1.4rem;
  font-family:inherit;
  outline:none;
  transition:border-color 0.15s;
}
.form-row input:focus,.form-row select:focus{border-color:var(--dark)}
.form-2col{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.submit-btn{
  width:100%;
  background:var(--accent);
  color:#fff;
  border:none;
  padding:1.6rem;
  font-size:1.5rem;
  font-weight:700;
  text-transform:uppercase;
  letter-spacing:0.08em;
  border-radius:var(--radius);
  margin-top:8px;
  transition:opacity 0.15s;
}
.submit-btn:hover{opacity:0.88}
.modal-sidebar{
  background:#f9fafb;
  padding:28px;
  border-left:1px solid var(--border);
}
.modal-sidebar h3{font-size:1.5rem;font-weight:700;margin-bottom:20px}
.order-item{
  display:flex;
  gap:14px;
  margin-bottom:16px;
  align-items:center;
}
.order-item-img-wrap{position:relative;flex-shrink:0}
.order-item-img{
  width:60px;
  height:60px;
  object-fit:cover;
  border-radius:8px;
  border:1px solid var(--border);
}
.order-item-qty{
  position:absolute;
  top:-6px;
  right:-6px;
  background:var(--muted);
  color:#fff;
  font-size:1.1rem;
  font-weight:700;
  width:18px;
  height:18px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
}
.order-item-info{flex:1}
.order-item-name{font-size:1.3rem;font-weight:600;margin-bottom:2px}
.order-item-variant{font-size:1.1rem;color:var(--muted)}
.order-item-price{font-size:1.4rem;font-weight:700}
.order-divider{border:none;border-top:1px solid var(--border);margin:16px 0}
.order-row{display:flex;justify-content:space-between;font-size:1.3rem;margin-bottom:8px}
.order-row.total{font-size:1.6rem;font-weight:700}

/* ─── RESPONSIVE ─────────────────────────────────── */
@media(max-width:900px){
  .header-inner{padding:0 2rem}
  .product-section{padding:2rem 2rem 3rem}
  .product-grid{grid-template-columns:1fr;gap:3rem}
  .gallery-col,.product-info{position:static}
  .sticky-atc-inner{padding:12px 2rem}
  .trust-strip{grid-template-columns:repeat(2,1fr)}
  .modal-body{grid-template-columns:1fr}
  .modal-sidebar{display:none}
  .header-nav{display:none}
}
@media(max-width:600px){
  .gallery-wrapper{flex-direction:column-reverse}
  .thumb-strip{flex-direction:row;width:100%;overflow-x:auto}
  .thumb{flex-shrink:0}
  .express-btns{grid-template-columns:1fr}
  .form-2col{grid-template-columns:1fr}
}
</style>
</head>
<body>

<!-- ═══ TICKER ════════════════════════════════════ -->
<div class="ticker" id="ticker"></div>

<!-- ═══ HEADER ════════════════════════════════════ -->
<header class="site-header">
  <div class="header-inner">
    <div class="header-logo" id="header-logo"></div>
    <nav class="header-nav">
      <a href="#product">Product</a>
      <a href="#faq">FAQ</a>
      <a href="#checkout" onclick="openCart();return false">Buy Now</a>
    </nav>
    <div class="header-icons">
      <button class="cart-btn" onclick="openCart()" aria-label="Cart">
        <svg viewBox="0 0 24 24"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
        <span class="cart-badge" id="cart-badge">0</span>
      </button>
    </div>
  </div>
</header>

<!-- ═══ PRODUCT ════════════════════════════════════ -->
<main class="product-section" id="product">
  <div class="product-grid">

    <!-- LEFT: Gallery -->
    <div class="gallery-col">
      <div class="gallery-wrapper">
        <div class="thumb-strip" id="thumb-strip"></div>
        <div class="main-image-wrap">
          <img id="main-img" src="" alt="Product" loading="eager">
        </div>
      </div>
      <div class="gallery-nav">
        <button onclick="prevImg()" aria-label="Previous">
          <svg viewBox="0 0 10 6"><path stroke-linecap="round" stroke-linejoin="round" d="M9 1L5 5 1 1"/></svg>
        </button>
        <span class="gallery-counter"><span id="img-cur">1</span> / <span id="img-tot">1</span></span>
        <button onclick="nextImg()" aria-label="Next">
          <svg viewBox="0 0 10 6"><path stroke-linecap="round" stroke-linejoin="round" d="M1 5l4-4 4 4"/></svg>
        </button>
      </div>
    </div>

    <!-- RIGHT: Info -->
    <div class="product-info">

      <h1 class="product-title" id="product-title"></h1>

      <div class="price-block" id="price-block"></div>

      <div class="stars-line" id="stars-line"></div>

      <div class="benefits-block" id="benefits-block"></div>

      <!-- Bundle picker -->
      <div class="bundle-section">
        <div class="bundle-title">Bundle &amp; Save</div>
        <div id="bundle-options"></div>
      </div>

      <button class="atc-btn" id="atc-btn" onclick="addToCart()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 001.98 1.61h9.72a2 2 0 001.98-1.61L23 6H6"/></svg>
        Add to cart
      </button>

      <div class="payment-icons">
        <span class="payment-icon">VISA</span>
        <span class="payment-icon">MC</span>
        <span class="payment-icon">AMEX</span>
        <span class="payment-icon">PayPal</span>
        <span class="payment-icon">Shop Pay</span>
      </div>

      <div class="trust-strip" id="trust-strip"></div>

      <div class="accordion" id="faq"></div>

    </div>
  </div>
</main>

<!-- ═══ STICKY ATC ═══════════════════════════════ -->
<div class="sticky-atc" id="sticky-atc">
  <div class="sticky-atc-inner">
    <div class="sticky-atc-left">
      <div class="sticky-title" id="sticky-title"></div>
      <div class="sticky-price" id="sticky-price"></div>
    </div>
    <button class="sticky-atc-btn" onclick="addToCart()">Add to Cart</button>
  </div>
</div>

<!-- ═══ CART DRAWER ═══════════════════════════════ -->
<div class="cart-overlay" id="cart-overlay" onclick="closeCart()"></div>
<div class="cart-drawer" id="cart-drawer">
  <div class="cart-header">
    <div>
      <h2>Your Cart</h2>
      <div class="cart-header-count" id="cart-header-count"></div>
    </div>
    <button class="cart-close" onclick="closeCart()">
      <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  </div>
  <div class="cart-body" id="cart-body">
    <div class="cart-empty">Your cart is empty</div>
  </div>
  <div class="cart-footer">
    <div class="cart-total-row">
      <span>Total</span>
      <span id="cart-total-price">$0.00</span>
    </div>
    <p class="cart-subtotal-note">Shipping &amp; taxes calculated at checkout</p>
    <button class="checkout-btn" onclick="openCheckout()">Proceed to Checkout</button>
  </div>
</div>

<!-- ═══ CHECKOUT MODAL ════════════════════════════ -->
<div class="modal-overlay" id="modal-overlay" onclick="handleModalClick(event)">
  <div class="modal-box">
    <div class="modal-top">
      <h2>Checkout</h2>
      <button class="modal-close" onclick="closeCheckout()">×</button>
    </div>
    <div class="modal-body">
      <div class="modal-form">
        <div class="express-btns">
          <button class="express-btn shop">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
            Shop Pay
          </button>
          <button class="express-btn">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="4" width="22" height="16" rx="2" ry="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>
            Google Pay
          </button>
        </div>
        <div class="or-divider">OR</div>
        <div class="form-row">
          <label>Email</label>
          <input type="email" placeholder="your@email.com">
        </div>
        <div class="form-2col">
          <div class="form-row"><label>First Name</label><input type="text" placeholder="John"></div>
          <div class="form-row"><label>Last Name</label><input type="text" placeholder="Smith"></div>
        </div>
        <div class="form-row"><label>Address</label><input type="text" placeholder="123 Main Street"></div>
        <div class="form-2col">
          <div class="form-row"><label>City</label><input type="text" placeholder="New York"></div>
          <div class="form-row"><label>ZIP Code</label><input type="text" placeholder="10001"></div>
        </div>
        <div class="form-row">
          <label>Country</label>
          <select>
            <option>United States</option><option>United Kingdom</option>
            <option>Canada</option><option>Australia</option>
            <option>Germany</option><option>France</option>
          </select>
        </div>
        <div class="form-row"><label>Card Number</label><input type="text" placeholder="1234 5678 9012 3456"></div>
        <div class="form-2col">
          <div class="form-row"><label>Expiry</label><input type="text" placeholder="MM / YY"></div>
          <div class="form-row"><label>CVC</label><input type="text" placeholder="123"></div>
        </div>
        <button class="submit-btn" onclick="fakeCheckout()">Complete Order</button>
      </div>
      <div class="modal-sidebar">
        <h3>Order Summary</h3>
        <div id="order-items"></div>
        <hr class="order-divider">
        <div class="order-row"><span>Subtotal</span><span id="order-subtotal"></span></div>
        <div class="order-row"><span>Shipping</span><span style="color:#53AF01;font-weight:600">FREE</span></div>
        <div class="order-row total"><span>Total</span><span id="order-total"></span></div>
      </div>
    </div>
  </div>
</div>

<script>
/* ═══════════════════════════════════════════════
   ▼▼▼  PRODUCT CONFIG — edit only this block  ▼▼▼
   swap brand/images/prices to change product
═══════════════════════════════════════════════ */
const P = {
  brand:        "PurrPal™",
  tagline:      "Self-Cleaning Pet Brush",
  currency:     "$",
  price:        24.99,
  comparePrice: 49.99,
  badge:        "50% OFF",
  reviews:      { score: "4.9", count: "3,847" },

  images: [
    "https://images.unsplash.com/photo-1514888286974-6c03e2ca1dba?w=900&h=900&fit=crop&q=85",
    "https://images.unsplash.com/photo-1548247416-ec66f4900b2e?w=900&h=900&fit=crop&q=85",
    "https://images.unsplash.com/photo-1495360010541-f48722b34f7d?w=900&h=900&fit=crop&q=85",
    "https://images.unsplash.com/photo-1518791841217-8f162f1912da?w=900&h=900&fit=crop&q=85",
  ],

  ticker: [
    "FLASH SALE: 50% OFF","●","FREE WORLDWIDE SHIPPING","●",
    "★★★★★ 4.9/5 | 3,847+","●","30-Day Money-Back Guarantee","●","100% Risk-Free!","●",
  ],

  benefits: "<strong>Self-cleaning.</strong> 🐾 Press the button — fur slides off instantly.<br><br>"
           +"<strong>Zero scratching.</strong> 🎯 Flexible soft bristles feel like a massage.<br><br>"
           +"<strong>10× faster.</strong> ⚡ Deshed your pet in under 2 minutes.",

  bundles: [
    { qty:1, label:"Buy 1",          tag:"50% OFF",       tagClass:"",       badge:null,          price:24.99, compare:49.99  },
    { qty:2, label:"Buy 2 + 1 Free", tag:"EXTRA 10% OFF", tagClass:"orange", badge:"Most Popular", price:44.98, compare:99.98  },
    { qty:3, label:"Buy 3",          tag:"EXTRA 15% OFF", tagClass:"red",    badge:null,          price:62.47, compare:149.97 },
  ],

  trust: [
    {icon:"🔒",text:"Secure Checkout"},
    {icon:"🚚",text:"Free Shipping"},
    {icon:"↩️",text:"30-Day Returns"},
    {icon:"⭐",text:"4.9★ Rating"},
  ],

  faq: [
    {q:"How does the self-cleaning mechanism work?",
     a:"Press the button on the back — the retraction mechanism slides all collected fur off the bristles instantly. No tangling, no mess."},
    {q:"What pets is PurrPal suitable for?",
     a:"PurrPal works great for cats, dogs, rabbits, and most small pets with short to medium length fur. The flexible bristles adapt to any coat type."},
    {q:"How long does shipping take?",
     a:"Orders ship within 24 hours. Standard: 5–7 business days. Express: 2–3 business days. Free shipping on all orders."},
    {q:"What is your return policy?",
     a:"We offer a full 30-day money-back guarantee. If you're not satisfied for any reason, return it for a complete refund — no questions asked."},
  ],
};
/* ═══════════════════════════════════════════════
   ▲▲▲  END CONFIG  ▲▲▲
═══════════════════════════════════════════════ */

/* ─── STATE ──────────────────────────────────── */
let currentImg  = 0;
let selectedQty = 2; // default to bundle[1] (most popular)
let cart        = [];

/* ─── INIT ───────────────────────────────────── */
function init() {
  document.title = P.brand + " — " + P.tagline;
  buildTicker();
  buildHeader();
  buildGallery();
  buildInfo();
  buildStickyAtc();
}

function buildTicker() {
  const items = [...P.ticker, ...P.ticker];
  document.getElementById('ticker').innerHTML =
    `<div class="ticker-track">${items.map(t=>`<p class="ticker-item">${t}</p>`).join('')}</div>`;
}

function buildHeader() {
  document.getElementById('header-logo').textContent = P.brand;
}

function buildGallery() {
  const mainImg = document.getElementById('main-img');
  mainImg.src   = P.images[0];
  mainImg.alt   = P.brand;
  document.getElementById('img-tot').textContent = P.images.length;

  const strip = document.getElementById('thumb-strip');
  P.images.forEach((src, i) => {
    const t = document.createElement('div');
    t.className = 'thumb' + (i===0?' is-active':'');
    t.innerHTML = `<img src="${src}" alt="View ${i+1}" loading="${i===0?'eager':'lazy'}">`;
    t.onclick   = () => setImg(i);
    strip.appendChild(t);
  });
}

window.setImg = function(i) {
  currentImg = i;
  document.getElementById('main-img').src = P.images[i];
  document.getElementById('img-cur').textContent = i + 1;
  document.querySelectorAll('.thumb').forEach((t,idx) => t.classList.toggle('is-active', idx===i));
};
window.prevImg = () => setImg((currentImg-1+P.images.length)%P.images.length);
window.nextImg = () => setImg((currentImg+1)%P.images.length);

function buildInfo() {
  document.getElementById('product-title').textContent = P.brand + ' ' + P.tagline;

  document.getElementById('price-block').innerHTML = `
    <span class="price-sale">${P.currency}${P.price.toFixed(2)}</span>
    <span class="price-compare">${P.currency}${P.comparePrice.toFixed(2)}</span>
    <span class="badge-tag">
      <svg viewBox="0 0 12 12"><path fill-rule="evenodd" d="M7 0h3a2 2 0 012 2v3a1 1 0 01-.3.7l-6 6a1 1 0 01-1.4 0l-4-4a1 1 0 010-1.4l6-6A1 1 0 017 0zm2 2a1 1 0 102 0 1 1 0 00-2 0z" fill="currentColor"/></svg>
      ${P.badge}
    </span>`;

  document.getElementById('stars-line').innerHTML =
    `<span class="stars">★★★★★</span> ${P.reviews.score}/5 by ${P.reviews.count}+ Happy Customers`;

  document.getElementById('benefits-block').innerHTML = `<p>${P.benefits}</p>`;

  // Bundle
  const bundleEl = document.getElementById('bundle-options');
  P.bundles.forEach((b, i) => {
    const checked = b.qty === selectedQty ? 'checked' : '';
    bundleEl.innerHTML += `
      <input class="qty-radio" type="radio" name="qty" id="qty${i}" value="${b.qty}" ${checked} onchange="onBundle(${i})">
      <label class="qty-label" for="qty${i}">
        ${b.badge ? `<span class="most-popular-badge">${b.badge}</span>` : ''}
        <div class="qty-label-inner">
          <div class="qty-left">
            <span class="qty-label-text">${b.label}</span>
            <span class="qty-benefit ${b.tagClass}">${b.tag}</span>
          </div>
          <div class="qty-right">
            <span class="qty-price">${P.currency}${b.price.toFixed(2)}</span>
            <span class="qty-compare">${P.currency}${b.compare.toFixed(2)}</span>
          </div>
        </div>
      </label>`;
  });

  // Trust
  const trustEl = document.getElementById('trust-strip');
  P.trust.forEach(t => {
    trustEl.innerHTML +=
      `<div class="trust-item"><span class="trust-icon">${t.icon}</span><span class="trust-text">${t.text}</span></div>`;
  });

  // FAQ / Accordion
  const faqEl = document.getElementById('faq');
  P.faq.forEach((f,i) => {
    faqEl.innerHTML += `
      <div class="acc-item" id="acc${i}">
        <button class="acc-trigger" onclick="toggleAcc(${i})">
          ${f.q}
          <span class="acc-chevron"><svg viewBox="0 0 10 6"><path stroke-linecap="round" stroke-linejoin="round" d="M1 1l4 4 4-4"/></svg></span>
        </button>
        <div class="acc-body">${f.a}</div>
      </div>`;
  });
}

function buildStickyAtc() {
  document.getElementById('sticky-title').textContent = P.brand + ' ' + P.tagline;
  updateStickyPrice();

  const observer = new IntersectionObserver(([e]) => {
    document.getElementById('sticky-atc').classList.toggle('show', !e.isIntersecting);
  }, {rootMargin:'-80px 0px 0px 0px'});
  observer.observe(document.getElementById('atc-btn'));
}

function updateStickyPrice() {
  const b = P.bundles.find(b=>b.qty===selectedQty) || P.bundles[0];
  document.getElementById('sticky-price').innerHTML =
    `<strong>${P.currency}${b.price.toFixed(2)}</strong>&ensp;<s style="color:#999">${P.currency}${b.compare.toFixed(2)}</s>`;
}

window.onBundle = function(i) {
  selectedQty = P.bundles[i].qty;
  updateStickyPrice();
};

window.toggleAcc = function(i) {
  const el = document.getElementById('acc'+i);
  const was = el.classList.contains('open');
  document.querySelectorAll('.acc-item').forEach(a=>a.classList.remove('open'));
  if(!was) el.classList.add('open');
};

/* ─── CART ───────────────────────────────────── */
window.addToCart = function() {
  const b = P.bundles.find(b=>b.qty===selectedQty) || P.bundles[0];
  const existing = cart.find(i=>i.qty===b.qty);
  if(existing) existing.count++;
  else cart.push({name:P.brand+' '+P.tagline, qty:b.qty, label:b.label, price:b.price, count:1, img:P.images[0]});
  renderCart();
  openCart();
};

function renderCart() {
  const total = cart.reduce((s,i)=>s+i.price*i.count,0);
  const count = cart.reduce((s,i)=>s+i.count,0);

  const badge = document.getElementById('cart-badge');
  badge.textContent = count;
  badge.classList.toggle('visible', count>0);
  document.getElementById('cart-header-count').textContent =
    count ? `${count} item${count>1?'s':''}` : '';
  document.getElementById('cart-total-price').textContent = P.currency+total.toFixed(2);

  const body = document.getElementById('cart-body');
  if(!cart.length){body.innerHTML='<div class="cart-empty">Your cart is empty</div>';return;}
  body.innerHTML = cart.map((item,idx)=>`
    <div class="cart-item">
      <img class="cart-item-img" src="${item.img}" alt="${item.name}">
      <div class="cart-item-info">
        <div class="cart-item-name">${item.name}</div>
        <div class="cart-item-variant">${item.label}</div>
        <div class="cart-item-bottom">
          <div class="qty-controls">
            <button onclick="chQty(${idx},-1)">−</button>
            <span class="qty-num">${item.count}</span>
            <button onclick="chQty(${idx},1)">+</button>
          </div>
          <span class="cart-item-price">${P.currency}${(item.price*item.count).toFixed(2)}</span>
        </div>
        <button class="cart-item-del" onclick="rmItem(${idx})">Remove</button>
      </div>
    </div>`).join('');
}

window.chQty = function(idx,d){cart[idx].count=Math.max(1,cart[idx].count+d);renderCart();};
window.rmItem = function(idx){cart.splice(idx,1);renderCart();};

window.openCart = function(){
  document.getElementById('cart-overlay').classList.add('open');
  document.getElementById('cart-drawer').classList.add('open');
  document.body.style.overflow='hidden';
};
window.closeCart = function(){
  document.getElementById('cart-overlay').classList.remove('open');
  document.getElementById('cart-drawer').classList.remove('open');
  document.body.style.overflow='';
};

/* ─── CHECKOUT ───────────────────────────────── */
window.openCheckout = function(){
  closeCart();
  document.getElementById('modal-overlay').classList.add('open');
  document.body.style.overflow='hidden';
  const total = cart.reduce((s,i)=>s+i.price*i.count,0);
  document.getElementById('order-subtotal').textContent = P.currency+total.toFixed(2);
  document.getElementById('order-total').textContent    = P.currency+total.toFixed(2);
  document.getElementById('order-items').innerHTML = cart.map(item=>`
    <div class="order-item">
      <div class="order-item-img-wrap">
        <img class="order-item-img" src="${item.img}" alt="">
        <span class="order-item-qty">${item.count}</span>
      </div>
      <div class="order-item-info">
        <div class="order-item-name">${item.name}</div>
        <div class="order-item-variant">${item.label}</div>
      </div>
      <span class="order-item-price">${P.currency}${(item.price*item.count).toFixed(2)}</span>
    </div>`).join('');
};
window.closeCheckout = function(){
  document.getElementById('modal-overlay').classList.remove('open');
  document.body.style.overflow='';
};
window.handleModalClick = function(e){if(e.target===e.currentTarget)closeCheckout();};
window.fakeCheckout = function(){
  alert('✅ Order placed! (demo — no real charge)');
  cart=[];renderCart();closeCheckout();
};

init();
</script>
</body>
</html>
